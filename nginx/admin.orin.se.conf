# Nginx reverse proxy — Medusa admin panel (admin.orin.se)
# The admin panel should NOT be exposed to the public internet in production.
# Restrict access to your VPN/office IP via allow/deny below.
#
# Deploy: copy to /etc/nginx/sites-enabled/admin.orin.se.conf on VPS
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name admin.orin.se;

    location /.well-known/acme-challenge/ {
        root /var/www/admin.orin.se/public;
    }

    location / {
        return 301 https://admin.orin.se$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.orin.se;

    ssl_certificate     /etc/nginx/ssl/admin.orin.se/certificate.crt;
    ssl_certificate_key /etc/nginx/ssl/admin.orin.se/private.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # TODO: Replace with your VPN/office IP range before going live.
    # Example: allow 203.0.113.0/24;
    # allow YOUR_IP;
    # deny all;

    # Medusa backend API + admin UI on port 9000
    location / {
        proxy_pass         http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Allow large image uploads from the admin panel
        client_max_body_size 20M;

        # Long timeout for database migrations run via the admin UI
        proxy_read_timeout 120s;
    }
}

# Medusa public store API — accessible at orin.se/api or via direct backend calls.
# If exposing /store/* routes publicly (e.g. for mobile apps), add a separate
# server block or location block here with appropriate rate limiting.
