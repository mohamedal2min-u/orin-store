# Nginx reverse proxy — storefront (orin.se)
# Managed by CloudPanel; regenerate SSL with: clpctl lets-encrypt:install
#
# Deploy: copy to /etc/nginx/sites-enabled/orin.se.conf on VPS
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name orin.se www.orin.se;

    # Let's Encrypt ACME challenge passthrough
    location /.well-known/acme-challenge/ {
        root /var/www/orin.se/public;
    }

    location / {
        return 301 https://orin.se$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.orin.se;

    ssl_certificate     /etc/nginx/ssl/orin.se/certificate.crt;
    ssl_certificate_key /etc/nginx/ssl/orin.se/private.key;

    return 301 https://orin.se$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name orin.se;

    ssl_certificate     /etc/nginx/ssl/orin.se/certificate.crt;
    ssl_certificate_key /etc/nginx/ssl/orin.se/private.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip for text assets — images served from CDN, not here
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # Storefront: Next.js standalone on port 3000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 30s;
    }

    # Next.js static assets — long cache, served directly
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
